name: Documentation

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ '3.12' ]

    steps:
    - uses: actions/checkout@v4

    - name: Cache emodb
      uses: actions/cache@v4
      with:
        path: ~/audb
        key: emodb-1.4.1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Ubuntu - install libsndfile
      uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
      with:
        packages: libsndfile1
        version: 1.0

      # DOCS
    - name: Ubuntu - install graphviz
      uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
      with:
        packages: graphviz
        version: 1.0

    - name: Ubuntu - register graphviz plugins
      run: sudo dot -c

    - name: Test building documentation
      run: uv run python -m sphinx docs/ docs/_build/ -b html -W

    - name: Check links in documentation
      run: uv run python -m sphinx docs/ docs/_build/ -b linkcheck -W
